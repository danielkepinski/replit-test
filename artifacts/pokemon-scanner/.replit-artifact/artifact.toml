kind = "web"
previewPath = "/"
title = "Pokémon Card Scanner"
version = "1.0.0"
id = "artifacts/pokemon-scanner"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25823

[services.development]
run = "pnpm --filter @workspace/pokemon-scanner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pokemon-scanner", "run", "build" ]
serve = "static"
publicDir = "artifacts/pokemon-scanner/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25823"
BASE_PATH = "/"
